# Schema Cache 配置
schema:
  cache:
    enabled: true
    root_dir: "/home/End_to_End_RAG/storage/schema_cache"
    force_rebuild: false
    
  method: "iterative_evolution"  # lightrag_default, iterative_evolution, llm_dynamic, llamaindex_dynamic
  use_entity_disambiguation: true
  disambiguation_threshold: 0.85
  
  evolution_config:
    max_entity_types: 50
    convergence_window: 3
    min_improvement: 0.05
    use_cache: true
    
  dynamic_schema_config:
    seed_types: ["Person", "Organization", "Location", "Event", "System"]
    max_triplets_per_chunk: 30
    use_cache: true

# 檢索 Pipeline 配置
retrieval:
  pipeline:
    enabled: false  # 預設關閉，需要時啟用
    components:
      - name: "base_retriever"
        type: "BaseRetriever"
        enabled: true
        params:
          mode: "hybrid"
          
      - name: "entity_disambiguation"
        type: "EntityDisambiguationComponent"
        enabled: false
        params:
          threshold: 0.85
          
      - name: "reranker"
        type: "RerankerComponent"
        enabled: false
        params:
          model: "BAAI/bge-reranker-v2-m3"
          top_k: 10
          
      - name: "tog_retriever"
        type: "ToGIterativeRetriever"
        enabled: false
        params:
          max_iterations: 3
  
  # Ablation Study 配置
  ablation_study:
    enabled: false
    generate_all_combinations: true
    exclude_baseline: false
    parallel_execution: false
    max_workers: 4
    
  # Adaptive Routing 配置
  adaptive_routing:
    enabled: false
    fallback_mode: "hybrid"
    use_llm_analysis: true
    
  # Graph Traversal Strategy 配置
  # 可選策略: k_hop | ppr | pcst | tog | anchor_hybrid_khop
  graph_traversal:
    strategy: "ppr"
    entity_linking_mode: "hybrid"   # local | global | hybrid | mix
    entity_linking_top_k: 10

    ppr:
      alpha: 0.85
      weight_mode: "semantic"       # semantic | degree | combined
      include_seeds: true

    pcst:
      prize_scale: 1.0
      cost_mode: "inverse_weight"   # inverse_weight | inverse_log_weight | uniform
      num_clusters: 1
      pruning: "gw"
      min_nodes: 5

    tog:
      max_iterations: 3
      beam_width: 5
      use_llm_scoring: true
      use_llm_sufficiency: true

  # ToG 配置（舊版，保留向後相容）
  tog_config:
    max_iterations: 3
    convergence_threshold: 0.9
    use_llm_sufficiency_check: true
    
  # Re-ranking 配置
  reranking:
    enabled: false
    model: "BAAI/bge-reranker-v2-m3"
    top_k: 10

graph:
  backend: "neo4j"
